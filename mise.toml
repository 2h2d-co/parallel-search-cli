[tools]
npm = "latest"
node = "24"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[shell_alias]
"parallel-search:local" = "node {{config_root}}/src/cli.ts"
"parallel:local" = "node {{config_root}}/src/cli.ts"
"search:local" = "node {{config_root}}/src/cli.ts search"
"extract:local" = "node {{config_root}}/src/cli.ts extract"

[tasks.check]
description = "Typecheck and lint the CLI"
run = """
npm run typecheck
npm run lint
"""

[tasks.test]
description = "Run tests"
run = "npm test"

[tasks.fmt]
description = "Format with oxfmt"
run = "npm run fmt"

[tasks.lint]
description = "Lint with oxlint"
run = "npm run lint"

[tasks."pack:dry"]
description = "Validate the npm package contents without publishing"
run = """
npm run build
npm pack --dry-run --allow-directory=all
"""

[tasks."publish:alpha"]
description = "Dry-run publishing parallel-search-cli to npm with the alpha dist-tag. Pass --execute to publish."
usage = """
flag "--execute" help="Publish to npm for real instead of running npm publish --dry-run"
"""
run = """
mise run check
npm test
mise run pack:dry

publish_mode="--dry-run"
if [ "${usage_execute:-false}" = "true" ]; then
  publish_mode=""
  echo "Publishing parallel-search-cli to npm with dist-tag 'alpha'."
else
  echo "Running npm publish dry run for dist-tag 'alpha'. Pass --execute to publish for real."
fi

npm publish --tag alpha --allow-directory=all ${publish_mode}
"""

[tasks."publish:beta"]
description = "Dry-run publishing parallel-search-cli to npm with the beta dist-tag. Pass --execute to publish."
usage = """
flag "--execute" help="Publish to npm for real instead of running npm publish --dry-run"
"""
run = """
mise run check
npm test
mise run pack:dry

publish_mode="--dry-run"
if [ "${usage_execute:-false}" = "true" ]; then
  publish_mode=""
  echo "Publishing parallel-search-cli to npm with dist-tag 'beta'."
else
  echo "Running npm publish dry run for dist-tag 'beta'. Pass --execute to publish for real."
fi

npm publish --tag beta --allow-directory=all ${publish_mode}
"""

[tasks."publish:prod"]
description = "Dry-run publishing parallel-search-cli to npm with the latest dist-tag. Pass --execute to publish."
usage = """
flag "--execute" help="Publish to npm for real instead of running npm publish --dry-run"
"""
run = """
mise run check
npm test
mise run pack:dry

publish_mode="--dry-run"
if [ "${usage_execute:-false}" = "true" ]; then
  publish_mode=""
  echo "Publishing parallel-search-cli to npm with dist-tag 'latest'."
else
  echo "Running npm publish dry run for dist-tag 'latest'. Pass --execute to publish for real."
fi

npm publish --tag latest --allow-directory=all ${publish_mode}
"""
